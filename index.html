<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IESAA 事前ニーズ調査アンケート</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f7fb;
    margin: 0;
    padding: 0;
  }

  .center-box {
    max-width: 420px;
    margin: 80px auto;
    background: #fff;
    padding: 28px 24px;
    border-radius: 14px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    animation: fadeIn 0.7s ease-out;
  }

  h2 {
    margin-top: 0;
    font-size: 1.3rem;
    text-align: center;
  }

  input[type="password"] {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 1rem;
    margin-top: 10px;
  }

  button {
    width: 100%;
    margin-top: 14px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #2f6fd6;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #1f5ac0;
  }

  #error {
    color: #e55353;
    margin-top: 10px;
    text-align: center;
    display: none;
  }

  #form-container {
    display: none;
    max-width: 900px;
    margin: 40px auto;
    padding: 0 16px 40px;
    animation: fadeIn 0.7s ease-out;
  }

  form {
    background: #fff;
    padding: 24px;
    border-radius: 14px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
  }

  label {
    font-weight: 600;
    margin-top: 12px;
    display: block;
  }

  input[type="text"],
  textarea {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-top: 6px;
  }

  textarea {
    min-height: 90px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid #ccc;
    margin: 4px 6px 0 0;
    cursor: pointer;
  }

  .chip input {
    margin: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

</head>
<body>

<!-- パスワード入力画面 -->
<div id="password-box" class="center-box">
  <h2>アクセス認証</h2>
  <p>パスワードを入力してください。</p>
  <input type="password" id="password-input" placeholder="パスワード">
  <button onclick="checkPassword()">送信</button>
  <div id="error">パスワードが違います。</div>
</div>

<!-- フォーム本体 -->
<div id="form-container">
  <form action="https://formspree.io/f/xjgzeqww" method="POST">

    <h2>IESAA 事前ニーズ調査アンケート</h2>

    <label>1-1. 貴社名</label>
    <input type="text" name="company" required>

    <label>1-2. 御担当者の役職</label>
    <input type="text" name="position">

    <label>1-3. 御担当領域</label>
    <label class="chip"><input type="checkbox" name="domain[]" value="教育">教育</label>
    <label class="chip"><input type="checkbox" name="domain[]" value="地域支援">地域支援</label>
    <label class="chip"><input type="checkbox" name="domain[]" value="システム">システム</label>
    <label class="chip"><input type="checkbox" name="domain[]" value="企画">企画</label>
    <label class="chip"><input type="checkbox" name="domain[]" value="その他">その他</label>

    <label>2-1. 現在の業務で感じている課題</label>
    <textarea name="current_issues"></textarea>

    <label>2-2. 教材・書籍に求める要素や内容</label>
    <textarea name="materials_expectation"></textarea>

    <label>2-3. 子供・教育・地域支援で必要なテーマ</label>
    <textarea name="important_themes"></textarea>

    <label>3-1. 読みやすい形式</label>
    <label class="chip"><input type="radio" name="format" value="図解中心">図解中心</label>
    <label class="chip"><input type="radio" name="format" value="ストーリー形式">ストーリー形式</label>
    <label class="chip"><input type="radio" name="format" value="ワーク形式">ワーク形式</label>
    <label class="chip"><input type="radio" name="format" value="事例中心">事例中心</label>
    <label class="chip"><input type="radio" name="format" value="その他">その他</label>

    <label>3-2. 教材に入れたい内容</label>
    <textarea name="material_contents"></textarea>

    <label>4-1. 合格後の記念に望ましいもの</label>
    <label class="chip"><input type="checkbox" name="exam_reward[]" value="合格証">合格証</label>
    <label class="chip"><input type="checkbox" name="exam_reward[]" value="認定バッジ">認定バッジ</label>
    <label class="chip"><input type="checkbox" name="exam_reward[]" value="その他">その他</label>

    <label>5-1. 三社連携で期待する点</label>
    <textarea name="collab_expectation"></textarea>

    <label>5-2. 不安や懸念点</label>
    <textarea name="collab_concerns"></textarea>

    <label>5-3. 自分が関わりたい役割</label>
    <textarea name="desired_role"></textarea>

    <button type="submit">送信</button>
  </form>
</div>

<script>
  function checkPassword() {
    const input = document.getElementById("password-input").value;
    const correct = "LT-caiesaa";

    if (input === correct) {
      document.getElementById("password-box").style.display = "none";
      document.getElementById("form-container").style.display = "block";
      window.scrollTo(0, 0);
    } else {
      document.getElementById("error").style.display = "block";
    }
  }
</script>

</body>
</html>
