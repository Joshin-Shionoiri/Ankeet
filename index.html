<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>IESAA 事前ニーズ調査アンケート</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f7fb;
    margin: 0;
    padding: 0;
  }

  .center-box {
    max-width: 420px;
    margin: 80px auto;
    background: #fff;
    padding: 28px 24px;
    border-radius: 14px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    animation: fadeIn 0.7s ease-out;
  }

  h2 {
    margin-top: 0;
    font-size: 1.3rem;
    text-align: center;
  }

  input[type="password"] {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 1rem;
    margin-top: 10px;
  }

  button {
    width: 100%;
    margin-top: 14px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #2f6fd6;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #1f5ac0;
  }

  #error {
    color: #e55353;
    margin-top: 10px;
    text-align: center;
    display: none;
  }

  /* フォーム表示時のアニメーション */
  #form-container {
    display: none;
    animation: fadeIn 0.7s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

</head>
<body>

<!-- パスワード入力画面 -->
<div id="password-box" class="center-box">
  <h2>アクセス認証</h2>
  <p>パスワードを入力してください。</p>
  <input type="password" id="password-input" placeholder="パスワード">
  <button onclick="checkPassword()">送信</button>
  <div id="error">パスワードが違います。</div>
</div>

<!-- フォーム本体（最初は非表示） -->
<div id="form-container">
  <!-- ここにあなたのフォームHTMLをそのまま貼る -->
  <iframe src="https://formspree.io/f/xjgzeqww" 
          style="width:100%; height:1600px; border:none;">
  </iframe>
</div>

<script>
  function checkPassword() {
    const input = document.getElementById("password-input").value;
    const correct = "LT-caiesaa";

    if (input === correct) {
      document.getElementById("password-box").style.display = "none";
      document.getElementById("form-container").style.display = "block";
      window.scrollTo(0, 0);
    } else {
      document.getElementById("error").style.display = "block";
    }
  }
</script>

</body>
</html>
