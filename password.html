<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>アクセス認証 | IESAA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        font-family: system-ui, sans-serif;
        background: #f5f7fb;
        margin: 0;
        padding: 0;
    }
    .box {
        max-width: 420px;
        margin: 80px auto;
        background: #fff;
        padding: 28px 24px;
        border-radius: 14px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        animation: fadeIn 0.7s ease-out;
    }
    h2 {
        text-align: center;
        margin-top: 0;
    }
    input[type="password"] {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        margin-top: 10px;
        font-size: 1rem;
    }
    button {
        width: 100%;
        margin-top: 14px;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #2f6fd6;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
    }
    #error {
        color: #e55353;
        margin-top: 10px;
        text-align: center;
        display: none;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

</head>
<body>

<div class="box">
    <h2>アクセス認証</h2>
    <p>パスワードを入力してください。</p>

    <input type="password" id="pw" placeholder="パスワード">
    <button onclick="check()">送信</button>

    <div id="error">パスワードが違います。</div>
</div>

<script>
function check() {
    const pw = document.getElementById("pw").value;
    if (pw === "LT-caiesaa") {
        window.location.href = "form.html";
    } else {
        document.getElementById("error").style.display = "block";
    }
}
</script>

</body>
</html>
